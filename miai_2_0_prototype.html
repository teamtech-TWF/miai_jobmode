<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiAI 2.0 Demo</title>
  <style>
    :root {
      --bg: #edf2fb;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-2: rgba(255, 255, 255, 0.72);
      --panel-3: rgba(248, 250, 255, 0.9);
      --ink: #0b1220;
      --muted: #334155;
      --line: rgba(148, 163, 184, 0.4);
      --line-strong: rgba(15, 23, 42, 0.24);
      --soft: rgba(226, 232, 240, 0.8);
      --accent: #111111;
      --accent-soft: rgba(17, 17, 17, 0.16);
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      --blur: blur(18px);
      --focus-ring: 0 0 0 3px rgba(10, 132, 255, 0.2);
      --radius: 20px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 12% 16%, rgba(15, 23, 42, 0.18), transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(51, 65, 85, 0.16), transparent 24%),
        radial-gradient(circle at 76% 74%, rgba(15, 23, 42, 0.1), transparent 22%),
        linear-gradient(180deg, #f6f9ff 0%, #eaf0fb 52%, #edf1f9 100%);
      color: var(--ink);
      font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.88;
    }

    body::before {
      top: -120px;
      left: -80px;
      background: radial-gradient(circle, rgba(15, 23, 42, 0.24) 0%, rgba(15, 23, 42, 0.08) 42%, transparent 74%);
    }

    body::after {
      right: -120px;
      top: 90px;
      background: radial-gradient(circle, rgba(51, 65, 85, 0.22) 0%, rgba(51, 65, 85, 0.08) 44%, transparent 74%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input::placeholder,
    textarea::placeholder {
      color: #526077;
      opacity: 1;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      width: 100%;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      filter: blur(22px);
      opacity: 0.9;
      mix-blend-mode: screen;
    }

    .bubble.red-a {
      width: 360px;
      height: 360px;
      top: 14%;
      right: 11%;
      background: radial-gradient(circle at 35% 35%, rgba(148, 163, 184, 0.58), rgba(51, 65, 85, 0.24) 45%, transparent 72%);
    }

    .bubble.blue-a {
      width: 420px;
      height: 420px;
      left: 54%;
      bottom: 4%;
      background: radial-gradient(circle at 45% 40%, rgba(226, 232, 240, 0.84), rgba(71, 85, 105, 0.22) 48%, transparent 74%);
    }

    .bubble.red-b {
      width: 240px;
      height: 240px;
      left: 8%;
      bottom: 18%;
      background: radial-gradient(circle at 40% 40%, rgba(203, 213, 225, 0.54), rgba(71, 85, 105, 0.16) 46%, transparent 74%);
    }

    .bubble.blue-b {
      width: 220px;
      height: 220px;
      right: 32%;
      top: 42%;
      background: radial-gradient(circle at 45% 40%, rgba(241, 245, 249, 0.74), rgba(100, 116, 139, 0.14) 46%, transparent 74%);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 18px;
      border-right: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.56);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.7));
      box-shadow: var(--glass-shadow), var(--shadow);
    }

    .eyebrow {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .brand h1 {
      margin: 9px 0 7px;
      font-size: 26px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .nav-list {
      display: grid;
      gap: 10px;
    }

    .nav-button {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.66));
      color: var(--ink);
      text-align: left;
      box-shadow: var(--glass-shadow);
      transition: 140ms ease;
      min-height: 46px;
    }

    .nav-button:hover {
      border-color: rgba(17, 17, 17, 0.22);
      transform: translateY(-1px);
    }

    .nav-button.active {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.92), rgba(58, 58, 58, 0.92));
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow: 0 22px 36px rgba(27, 40, 78, 0.22);
    }

    .nav-button.active .eyebrow,
    .nav-button.active span {
      color: rgba(255, 255, 255, 0.9);
    }

    .nav-button strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .nav-button span {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      opacity: 0.78;
    }

    .main {
      padding: 20px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .topbar,
    .card,
    .wire-panel,
    .info-card,
    .stat,
    .chip,
    .project-card,
    .table-card,
    .workspace-panel,
    .artifact-card,
    .message,
    .action-row button,
    .mode-card,
    .export-card,
    .check-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.72));
      box-shadow: var(--glass-shadow), var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .topbar {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .title-wrap h2 {
      margin: 7px 0 4px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 96ch;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--glass-shadow);
      font-size: 11px;
      font-weight: 700;
    }

    .screen-shell {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .hero-grid,
    .split-2,
    .split-3,
    .dashboard-grid,
    .project-grid,
    .modes-grid,
    .job-grid,
    .artifact-grid,
    .export-grid,
    .details-grid {
      display: grid;
      gap: 14px;
    }

    .hero-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .dashboard-grid {
      grid-template-columns: 1.4fr 0.8fr;
    }

    .split-2 {
      grid-template-columns: 1fr 1fr;
    }

    .split-3 {
      grid-template-columns: 1.1fr 1fr 0.8fr;
    }

    .details-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .project-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modes-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .job-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .artifact-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .export-grid {
      grid-template-columns: 1fr 0.82fr;
    }

    .card,
    .wire-panel,
    .info-card,
    .workspace-panel,
    .table-card {
      padding: 16px;
    }

    .section-title {
      margin: 7px 0 11px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 16px;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-top: 6px;
      letter-spacing: -0.04em;
    }

    .project-card,
    .mode-card,
    .artifact-card,
    .export-card,
    .check-card {
      padding: 16px;
    }

    .project-card.selected,
    .mode-card.selected,
    .artifact-card.selected,
    .export-card.selected {
      border-color: rgba(10, 132, 255, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 251, 255, 0.78));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8), 0 20px 40px rgba(21, 40, 78, 0.12);
    }

    .project-head,
    .item-head,
    .workspace-head,
    .message-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      background: rgba(255, 255, 255, 0.76);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .badge.inverse {
      background: linear-gradient(135deg, #111111, #3a3a3a);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.24);
    }

    .badge.outline {
      background: transparent;
      border-style: dashed;
    }

    .project-card h4,
    .mode-card h4,
    .artifact-card h4,
    .export-card h4,
    .check-card h4,
    .workspace-panel h4,
    .info-card h4 {
      margin: 9px 0 7px;
      font-size: 16px;
      line-height: 1.2;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .progress {
      height: 8px;
      width: 100%;
      background: rgba(203, 213, 225, 0.55);
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 10px;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #111111, #4b5563);
      border-radius: inherit;
    }

    .meta-row,
    .chip-row,
    .filters,
    .composer,
    .action-row,
    .check-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-row {
      gap: 12px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      min-width: 0;
    }

    .chip {
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.72);
    }

    .chip.interactive:hover {
      border-color: rgba(17, 17, 17, 0.24);
    }

    .button,
    .action-row button,
    .composer button,
    .filters button {
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      box-shadow: var(--glass-shadow);
      min-height: 42px;
      font-weight: 600;
    }

    .button.primary,
    .action-row button.primary,
    .composer button,
    .filters button.primary {
      background: linear-gradient(135deg, #111111, #3a3a3a);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .button.ghost,
    .action-row button.ghost {
      background: transparent;
      border-style: dashed;
    }

    .input,
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.44);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      padding: 11px 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      min-height: 42px;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.5fr repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .list,
    .table-list {
      display: grid;
      gap: 10px;
    }

    .list-item {
      padding: 11px 13px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.55;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.9fr;
      gap: 14px;
      align-items: start;
    }

    .chat-mode-shell {
      display: grid;
      grid-template-columns: 252px minmax(0, 1.55fr) 332px;
      gap: 14px;
      align-items: start;
    }

    .thread-list {
      display: grid;
      gap: 10px;
    }

    .thread-card {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      text-align: left;
      box-shadow: var(--glass-shadow);
      min-height: 84px;
    }

    .thread-card.active {
      border-color: rgba(10, 132, 255, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 251, 255, 0.8));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.84), 0 20px 40px rgba(21, 40, 78, 0.12);
    }

    .thread-card h4 {
      margin: 8px 0 5px;
      font-size: 15px;
      line-height: 1.25;
    }

    .thread-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .job-mode-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .job-mode-card {
      min-height: 168px;
      display: grid;
      align-content: start;
      gap: 8px;
      text-align: left;
    }

    .job-mode-card .meta-row {
      margin-top: 4px;
    }

    .workspace-panel {
      min-height: 620px;
      display: grid;
      align-content: start;
      gap: 14px;
      min-width: 0;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
      min-height: 38px;
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.9), rgba(58, 58, 58, 0.9));
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.24);
    }

    .preview-box {
      min-height: 170px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.6;
    }

    .messages {
      display: grid;
      gap: 12px;
      min-height: 340px;
      align-content: start;
    }

    .message {
      padding: 14px;
    }

    .message.user {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.7));
    }

    .message.assistant {
      background: linear-gradient(180deg, rgba(247, 251, 255, 0.94), rgba(240, 247, 255, 0.8));
      border-color: rgba(10, 132, 255, 0.26);
    }

    .message-body {
      margin-top: 8px;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.6;
    }

    .sources {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-top: auto;
      min-width: 0;
    }

    .workspace-head > *,
    .project-head > *,
    .item-head > *,
    .message-head > * {
      min-width: 0;
    }

    .workspace-head h4,
    .project-card h4,
    .mode-card h4,
    .artifact-card h4,
    .export-card h4,
    .thread-card h4,
    .section-title,
    .title-wrap h2 {
      overflow-wrap: anywhere;
    }

    .table-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }

    .table-card th,
    .table-card td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      vertical-align: top;
      line-height: 1.55;
    }

    .table-card th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      min-height: 46px;
    }

    .check input {
      width: 18px;
      height: 18px;
      margin: 1px 0 0;
      accent-color: var(--accent);
    }

    .footnote {
      padding: 16px 18px;
      border: 1px dashed rgba(17, 17, 17, 0.28);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.6;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .tab:focus-visible,
    .nav-button:focus-visible,
    .chip.interactive:focus-visible {
      outline: none;
      border-color: rgba(17, 17, 17, 0.4);
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.14);
    }

    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto;
        transition: none !important;
        animation: none !important;
      }
    }

    @media (max-width: 1440px) {
      .app {
        grid-template-columns: 244px 1fr;
      }

      .sidebar {
        padding: 16px;
        gap: 14px;
      }

      .main {
        padding: 16px;
        gap: 14px;
      }

      .topbar,
      .card,
      .wire-panel,
      .info-card,
      .stat,
      .chip,
      .project-card,
      .table-card,
      .workspace-panel,
      .artifact-card,
      .message,
      .action-row button,
      .mode-card,
      .export-card,
      .check-card {
        border-radius: 16px;
      }

      .topbar {
        padding: 16px 18px;
      }

      .title-wrap h2 {
        font-size: 30px;
      }

      .section-title {
        font-size: 20px;
        margin-bottom: 10px;
      }

      .hero-grid,
      .dashboard-grid,
      .split-3,
      .details-grid,
      .export-grid {
        grid-template-columns: 1fr;
      }

      .split-2 {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .modes-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .job-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .chat-mode-shell {
        grid-template-columns: 248px minmax(0, 1fr);
      }

      .chat-mode-shell .workspace-panel:last-child {
        grid-column: 1 / -1;
      }

      .workspace-panel:last-child {
        grid-column: 1 / -1;
      }

      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .artifact-grid,
      .project-grid,
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1280px) {
      .app {
        grid-template-columns: 220px 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .top-actions {

    function getCreationReadiness() {
      const creation = state.projectCreation;

        creation.instructionFiles.some((file) => file.status === "Completed") &&
        creation.instructionText.trim().length > 20;

      const readinessByMode = {
        "file-first": fileFirstReady,
        "instruction-files": instructionReady,
        "brief-first": briefReady

    function refreshCreateProjectReadiness() {
      const isReady = getCreationReadiness();
      const title = document.getElementById("creation-readiness-title");
      const badge = document.getElementById("creation-readiness-badge");

    function escapeHtml(value) {

    function addChatResponse(prompt) {
      const artifact = getActiveArtifact();
      let response = "MiAI can answer using the approved context, selected artifact, and linked evidence. The next step should keep governance visible and move only the selected artifact forward.";
      let createArtifact = false;

      if (/compare/i.test(prompt)) {
        response = "Compared with the earlier version, the current artifact is clearer on Healthy Convenience and stronger on category rationale, but HoReCa support still needs reinforcement.";
      } else if (/missing/i.test(prompt)) {
        response = "What is still missing: stronger HoReCa support, clearer risk framing, and a more concise client-facing articulation of the strategic shift.";
      } else if (/evidence/i.test(prompt)) {
        response = "The current recommendation is grounded in purchase-driver, frozen-frequency, and competitor-gap evidence. Remaining weak spots should be treated as assumptions until verified.";
      } else if (/next step/i.test(prompt)) {
        response = "Suggested next step: approve the strategic direction conditionally, request tighter Horeca proof, then generate the client-facing storyline artifact.";
      } else if (/rewrite|client/i.test(prompt)) {
        response = "I can generate a client-facing storyline version of the selected strategy artifact and add it to the workspace.";
        createArtifact = true;
      }

      state.chatMessages.push({
        role: "assistant",
        time: "10:48",
        body: response,
        sources: `Sources: ${artifact.evidence >= 20 ? "12, 15, 17" : "15, 17"}`,
        createArtifact

    function pushProjectChatToArtifact(messageIndex) {
      const thread = getActiveChatThread();
      const message = thread.messages[messageIndex];
      const targetId = message.targetsArtifact || state.activeArtifactId;
      const artifact = state.artifacts.find((item) => item.id === targetId) || getActiveArtifact();
      artifact.tabs.notes += `\nChat Mode note from ${thread.title} / ${message.agent}: ${message.body}`;
      artifact.tabs.activity += `\nUpdated from Chat Mode thread: ${thread.title}`;
      state.activeArtifactId = artifact.id;
      state.activeArtifactTab = "notes";
    }

    function applyArtifactAction(action) {
      const artifact = getActiveArtifact();
      if (action === "approve") {
        artifact.status = "Approved";
        artifact.tabs.activity += "\nApproved by reviewer";
      }
      if (action === "edit") {
        artifact.tabs.notes += "\nEdit requested: simplify client-facing phrasing.";
        state.activeArtifactTab = "notes";
      }
      if (action === "reject") {
        artifact.status = "Rejected";
        artifact.tabs.activity += "\nRejected and routed back for regeneration";
      }
      if (action === "regenerate") {
        artifact.status = "Awaiting Review";
        artifact.version = bumpVersion(artifact.version);
        artifact.tabs.versions = `${artifact.tabs.versions}\n${artifact.version} - Awaiting Review`;
        artifact.tabs.activity += `\nRegenerated to ${artifact.version}`;
      }
      if (action === "lock") {
        artifact.status = "Locked";
        artifact.tabs.activity += "\nVersion locked for export";
      }
      if (action === "export") {
        state.exportReady = artifact.status === "Approved" || artifact.status === "Locked";
        if (state.exportReady) {
          state.currentScreen = "export";
        } else {
          artifact.tabs.activity += "\nExport blocked until artifact is approved or locked";
          state.activeArtifactTab = "activity";
        }
      }
    }

    function bumpVersion(version) {
      const match = version.match(/^v(\d+)\.(\d+)$/);
      if (!match) return version;
      return `v${match[1]}.${Number(match[2]) + 1}`;
    }

      const newThread = document.getElementById("new-chat-thread");
      if (newThread) {
        newThread.addEventListener("click", () => {
          const nextNumber = state.projectChatThreads.length + 1;
          const id = `thread-${Date.now()}`;
          state.projectChatThreads.unshift({
            id,
            title: `New Chat ${nextNumber}`,
            purpose: "Separate workstream for focused agent collaboration.",
            agent: "Strategy Agent",
            messages: [
              {
                role: "assistant",
                time: "10:44",
                agent: "Strategy Agent",
                body: "New chat created. Use this thread for a distinct task so the context stays narrow and easier to optimize."
              }
            ]
          });
          state.activeChatThreadId = id;
          state.activeChatAgent = "Strategy Agent";
          state.projectChatInput = "";
          render();
        });
      }

      screenShell.querySelectorAll("[data-project-chat-chip]").forEach((button) => {
        button.addEventListener("click", () => {
          state.projectChatInput = button.dataset.projectChatChip;
          const input = document.getElementById("project-chat-input");
          if (input) input.focus();
        });
      });

      const input = document.getElementById("project-chat-input");
      if (input) {
        input.addEventListener("input", (e) => {
          state.projectChatInput = e.target.value;
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            const value = input.value.trim();
            if (!value) return;
            const activeThread = getActiveChatThread();
            activeThread.messages.push({
              role: "user",
              time: "10:43",
              body: value
            });
            activeThread.messages.push(getProjectChatResponse(value, activeThread));
            state.projectChatInput = "";
            render();
          }
        });
      }

      const sendButton = document.getElementById("send-project-chat-button");
      if (sendButton) {
        sendButton.addEventListener("click", () => {
          const value = state.projectChatInput.trim();
          if (!value) return;
          const activeThread = getActiveChatThread();
          activeThread.messages.push({
            role: "user",
            time: "10:43",
            body: value
          });
          activeThread.messages.push(getProjectChatResponse(value, activeThread));
          state.projectChatInput = "";
          render();
        });
      }

      screenShell.querySelectorAll("[data-push-chat-artifact]").forEach((button) => {
        button.addEventListener("click", () => {
          pushProjectChatToArtifact(Number(button.dataset.pushChatArtifact));
          state.currentScreen = "artifacts-chat";
          render();
        });
      });

      const openArtifactReview = document.getElementById("open-artifact-review");
      if (openArtifactReview) {
        openArtifactReview.addEventListener("click", () => {
          state.currentScreen = "artifacts-chat";
          render();
        });
      }

      const seedChatFromArtifact = document.getElementById("seed-chat-from-artifact");
      if (seedChatFromArtifact) {
        seedChatFromArtifact.addEventListener("click", () => {
          const artifact = getActiveArtifact();
          const activeThread = getActiveChatThread();
          activeThread.messages.push({
            role: "assistant",
            time: "10:44",
            agent: activeThread.agent,
            body: `Loaded ${artifact.title} ${artifact.version} into project chat. Current focus: ${artifact.status.toLowerCase()} artifact with ${artifact.evidence} evidence references.`
          });
          render();
        });
      }

      const sendChatToExport = document.getElementById("send-chat-to-export");
      if (sendChatToExport) {
        sendChatToExport.addEventListener("click", () => {
          state.currentScreen = "export";
          render();
        });
      }
    }

    function bindExport() {
      screenShell.querySelectorAll("[data-export-format]").forEach((button) => {
        button.addEventListener("click", () => {
          state.exportFormat = button.dataset.exportFormat;
          render();
        });
      });

      screenShell.querySelectorAll("[data-export-check]").forEach((checkbox) => {
        checkbox.addEventListener("change", (e) => {
          state.exportOptions[e.target.dataset.exportCheck] = e.target.checked;
        });
      });

      const fileName = document.getElementById("export-file-name");
      if (fileName) {
        fileName.addEventListener("input", (e) => {
          state.exportFileName = e.target.value;
        });
      }

      const preview = document.getElementById("preview-export-button");
      if (preview) {
        preview.addEventListener("click", () => {
          state.exportReady = true;
          render();
        });
      }

      const exportFinal = document.getElementById("export-final-button");
      if (exportFinal) {
        exportFinal.addEventListener("click", () => {
          state.exportReady = true;
          const artifact = getActiveArtifact();
          artifact.status = "Locked";
          render();
        });
      }
    }

    function renderScreen() {
      if (state.currentScreen === "dashboard") {
        screenShell.innerHTML = renderDashboard();
        bindDashboard();
        return;
      }

      if (state.currentScreen === "create-project") {
        screenShell.innerHTML = renderCreateProject();
        bindCreateProject();
        return;
      }

      if (state.currentScreen === "context-packet") {
        screenShell.innerHTML = renderContextPacket();
        bindContextPacket();
        return;
      }

      if (state.currentScreen === "job-mode") {
        screenShell.innerHTML = renderJobMode();
        bindJobMode();
        return;
      }

      if (state.currentScreen === "chat-mode") {
        screenShell.innerHTML = renderChatMode();
        bindChatMode();
        return;
      }

      if (state.currentScreen === "artifacts-chat") {
        screenShell.innerHTML = renderArtifactsChat();
        bindArtifactsChat();
        return;
      }

      screenShell.innerHTML = renderExport();
      bindExport();
    }

    function render() {
      renderNav();
      updateTopbar();
      renderScreen();
    }

    render();
  </script>
</body>
</html>
